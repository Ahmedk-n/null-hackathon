<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="redGlow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="820" fill="#0d1117"/>
  <g stroke="#161d29" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="280" x2="1280" y2="280"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="700" x2="1280" y2="700"/>
  </g>

  <!-- header -->
  <text x="48" y="58" fill="#e6edf3" font-size="34" font-weight="700" letter-spacing="3">KEYSTONE</text>
  <text x="50" y="86" fill="#f87171" font-size="15">AFTER LOAD APPLIED · structure buckled — keystone assumption failed</text>

  <!-- integrity gauge (craters to 34%) -->
  <g transform="translate(1150,72)">
    <circle r="46" fill="none" stroke="#232c39" stroke-width="12"/>
    <circle r="46" fill="none" stroke="#ef4444" stroke-width="12" stroke-linecap="round"
            stroke-dasharray="98.3 289" transform="rotate(-90)"/>
    <text y="6" text-anchor="middle" fill="#f87171" font-size="28" font-weight="700">34%</text>
  </g>
  <text x="1150" y="146" text-anchor="middle" fill="#f87171" font-size="11" letter-spacing="1.5">STRUCTURAL INTEGRITY ▼53</text>

  <!-- ================= BROKEN EDGES ================= -->
  <!-- claim->thesis: C1,C2 broken; C3 still holds (dimmed) -->
  <g fill="none">
    <path d="M280,360 C280,300 470,300 470,242" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 8" opacity="0.5"/>
    <path d="M560,360 L560,242" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 8" opacity="0.5"/>
    <path d="M840,360 C840,300 650,300 650,242" stroke="#46525f" stroke-width="2" opacity="0.4"/>
  </g>
  <!-- assumption->claim: survivors dimmed -->
  <g stroke="#46525f" stroke-width="2" fill="none" opacity="0.3">
    <path d="M680,575 C680,500 600,500 600,420"/>
    <path d="M930,575 C930,500 860,500 860,420"/>
    <path d="M680,575 C680,490 780,490 780,420"/>
    <path d="M180,575 C180,500 240,500 240,420"/>
  </g>
  <!-- keystone load paths: severed -->
  <g stroke="#ef4444" stroke-width="2.5" fill="none" opacity="0.4" stroke-dasharray="5 9">
    <path d="M430,575 C430,500 320,500 320,420"/>
    <path d="M430,575 C430,500 480,500 480,420"/>
  </g>

  <!-- ================= NODES ================= -->
  <!-- Thesis: unsupported / cracked -->
  <g transform="rotate(-2 560 210)" opacity="0.55">
    <rect x="410" y="178" width="300" height="64" rx="10" fill="#1c1416" stroke="#ef4444" stroke-width="2" stroke-dasharray="7 5"/>
    <polyline points="440,178 470,210 452,224 500,242" fill="none" stroke="#ef4444" stroke-width="1.3" opacity="0.7"/>
    <text x="425" y="200" fill="#f87171" font-size="10" letter-spacing="2">DECISION · UNSUPPORTED</text>
    <text x="560" y="226" text-anchor="middle" fill="#c9b0b3" font-size="16" font-weight="600">Migrate to microservices</text>
  </g>

  <!-- Claim C1: fallen -->
  <g transform="translate(-18,52) rotate(-9 280 390)" opacity="0.4">
    <rect x="180" y="360" width="200" height="60" rx="9" fill="#1c1416" stroke="#ef4444" stroke-width="1.4" stroke-dasharray="6 5"/>
    <text x="192" y="380" fill="#f87171" font-size="9" letter-spacing="2">CLAIM · FAILED</text>
    <text x="280" y="404" text-anchor="middle" fill="#b79a9d">Scaling pain gets solved</text>
  </g>
  <!-- Claim C2: fallen -->
  <g transform="translate(14,58) rotate(7 560 390)" opacity="0.4">
    <rect x="460" y="360" width="200" height="60" rx="9" fill="#1c1416" stroke="#ef4444" stroke-width="1.4" stroke-dasharray="6 5"/>
    <text x="472" y="380" fill="#f87171" font-size="9" letter-spacing="2">CLAIM · FAILED</text>
    <text x="560" y="404" text-anchor="middle" fill="#b79a9d">Team can operate it</text>
  </g>
  <!-- Claim C3: survives (dimmed) -->
  <g opacity="0.7">
    <rect x="740" y="360" width="200" height="60" rx="9" fill="#0f2528" stroke="#14b8a6" stroke-width="1.6"/>
    <text x="752" y="380" fill="#4fd1c5" font-size="9" letter-spacing="2">CLAIM · HOLDING</text>
    <text x="840" y="404" text-anchor="middle" fill="#cdd6e0">Cost justified by ROI</text>
  </g>

  <!-- Assumptions: survivors dimmed -->
  <g font-size="13" fill="#9aa4b0" opacity="0.55">
    <g>
      <rect x="85" y="575" width="190" height="66" rx="9" fill="#1a2130" stroke="#4b5563" stroke-width="1.4"/>
      <text x="97" y="595" fill="#8b98a5" font-size="9" letter-spacing="1.5">ASSUMPTION · orphaned</text>
      <text x="180" y="617" text-anchor="middle">Load is uneven</text>
      <text x="180" y="633" text-anchor="middle">across features</text>
    </g>
    <g>
      <rect x="585" y="575" width="190" height="66" rx="9" fill="#1a2130" stroke="#4b5563" stroke-width="1.4"/>
      <text x="597" y="595" fill="#8b98a5" font-size="9" letter-spacing="1.5">ASSUMPTION · 0.71</text>
      <text x="680" y="617" text-anchor="middle">We have k8s /</text>
      <text x="680" y="633" text-anchor="middle">DevOps maturity</text>
    </g>
    <g>
      <rect x="835" y="575" width="190" height="66" rx="9" fill="#1a2130" stroke="#4b5563" stroke-width="1.4"/>
      <text x="847" y="595" fill="#8b98a5" font-size="9" letter-spacing="1.5">ASSUMPTION · 0.78</text>
      <text x="930" y="617" text-anchor="middle">Services have</text>
      <text x="930" y="633" text-anchor="middle">clean boundaries</text>
    </g>
  </g>

  <!-- KEYSTONE: shattered -->
  <g filter="url(#redGlow2)" transform="translate(6,10) rotate(-3 430 608)">
    <rect x="335" y="575" width="190" height="66" rx="9" fill="#2a1416" stroke="#ef4444" stroke-width="2.4"/>
    <polyline points="352,575 396,600 366,616 430,641" fill="none" stroke="#ef4444" stroke-width="1.8"/>
    <polyline points="430,575 452,606 470,641" fill="none" stroke="#ef4444" stroke-width="1.4" opacity="0.8"/>
    <text x="347" y="595" fill="#f87171" font-size="9" letter-spacing="1.5">KEYSTONE · 0.11 · FAILED</text>
    <text x="430" y="617" text-anchor="middle" fill="#fca5a5" font-size="12.5">Scaling pain is</text>
    <text x="430" y="633" text-anchor="middle" fill="#fca5a5" font-size="12.5">architectural, not org</text>
  </g>

  <!-- Attack card that killed it -->
  <g transform="translate(70,690)">
    <rect x="0" y="0" width="470" height="70" rx="8" fill="#1a0f11" stroke="#ef4444" stroke-width="1.4"/>
    <text x="16" y="22" fill="#f87171" font-size="12" font-weight="700" letter-spacing="1">⚡ ATTACK · execution risk · severity 0.80</text>
    <text x="16" y="43" fill="#e6a5a5" font-size="12">Your latency traces to N+1 DB queries, not the monolith.</text>
    <text x="16" y="60" fill="#e6a5a5" font-size="12">Microservices add network hops — they'd make it worse.</text>
  </g>

  <!-- verdict -->
  <g transform="translate(620,700)">
    <text x="0" y="16" fill="#f87171" font-size="15" font-weight="700">Verdict: decision unsupported.</text>
    <text x="0" y="40" fill="#8b98a5" font-size="12.5">One load-bearing assumption carried two of three claims.</text>
    <text x="0" y="58" fill="#8b98a5" font-size="12.5">Validate it before committing — or the whole decision falls.</text>
  </g>
</svg>
