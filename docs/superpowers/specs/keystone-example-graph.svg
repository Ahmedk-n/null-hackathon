<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="redGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="thesisFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16304f"/><stop offset="1" stop-color="#0f2137"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="820" fill="#0d1117"/>
  <g stroke="#161d29" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="280" x2="1280" y2="280"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="700" x2="1280" y2="700"/>
  </g>

  <!-- header -->
  <text x="48" y="58" fill="#e6edf3" font-size="34" font-weight="700" letter-spacing="3">KEYSTONE</text>
  <text x="50" y="86" fill="#8b98a5" font-size="15">Cognitive CAD — decision structure · "We should migrate to microservices"</text>

  <!-- integrity gauge -->
  <g transform="translate(1150,72)">
    <circle r="46" fill="none" stroke="#232c39" stroke-width="12"/>
    <circle r="46" fill="none" stroke="#22c55e" stroke-width="12" stroke-linecap="round"
            stroke-dasharray="251.4 289" transform="rotate(-90)"/>
    <text y="6" text-anchor="middle" fill="#e6edf3" font-size="28" font-weight="700">87%</text>
  </g>
  <text x="1150" y="146" text-anchor="middle" fill="#8b98a5" font-size="11" letter-spacing="1.5">STRUCTURAL INTEGRITY</text>

  <!-- ================= EDGES ================= -->
  <!-- claims -> thesis (normal) -->
  <g stroke="#46525f" stroke-width="2" fill="none" opacity="0.8">
    <path d="M280,360 C280,300 470,300 470,242"/>
    <path d="M560,360 L560,242"/>
    <path d="M840,360 C840,300 650,300 650,242"/>
  </g>
  <!-- assumptions -> claims (normal) -->
  <g stroke="#46525f" stroke-width="2" fill="none" opacity="0.8">
    <path d="M180,575 C180,500 240,500 240,420"/>
    <path d="M680,575 C680,500 600,500 600,420"/>
    <path d="M930,575 C930,500 860,500 860,420"/>
    <path d="M680,575 C680,490 780,490 780,420"/>
  </g>
  <!-- KEYSTONE load paths (red, feeds TWO claims => why it's load-bearing) -->
  <g stroke="#ef4444" stroke-width="2.5" fill="none" opacity="0.95">
    <path d="M430,575 C430,500 320,500 320,420"/>
    <path d="M430,575 C430,500 480,500 480,420"/>
  </g>

  <!-- ================= NODES ================= -->
  <!-- Thesis / Decision -->
  <g>
    <rect x="410" y="178" width="300" height="64" rx="10" fill="url(#thesisFill)" stroke="#3b82f6" stroke-width="2"/>
    <text x="425" y="200" fill="#7ca9e6" font-size="10" letter-spacing="2">DECISION</text>
    <text x="560" y="226" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="600">Migrate to microservices</text>
  </g>
  <!-- AND tag -->
  <g transform="translate(560,300)">
    <rect x="-22" y="-13" width="44" height="22" rx="11" fill="#1b2230" stroke="#46525f"/>
    <text y="4" text-anchor="middle" fill="#8b98a5" font-size="11" letter-spacing="1">AND</text>
  </g>

  <!-- Claims -->
  <g font-size="14" fill="#e6edf3">
    <g>
      <rect x="180" y="360" width="200" height="60" rx="9" fill="#0f2528" stroke="#14b8a6" stroke-width="1.6"/>
      <text x="192" y="380" fill="#4fd1c5" font-size="9" letter-spacing="2">CLAIM</text>
      <text x="280" y="404" text-anchor="middle">Scaling pain gets solved</text>
    </g>
    <g>
      <rect x="460" y="360" width="200" height="60" rx="9" fill="#0f2528" stroke="#14b8a6" stroke-width="1.6"/>
      <text x="472" y="380" fill="#4fd1c5" font-size="9" letter-spacing="2">CLAIM</text>
      <text x="560" y="404" text-anchor="middle">Team can operate it</text>
    </g>
    <g>
      <rect x="740" y="360" width="200" height="60" rx="9" fill="#0f2528" stroke="#14b8a6" stroke-width="1.6"/>
      <text x="752" y="380" fill="#4fd1c5" font-size="9" letter-spacing="2">CLAIM</text>
      <text x="840" y="404" text-anchor="middle">Cost justified by ROI</text>
    </g>
  </g>

  <!-- Assumptions -->
  <g font-size="13" fill="#cdd6e0">
    <g>
      <rect x="85" y="575" width="190" height="66" rx="9" fill="#1a2130" stroke="#4b5563" stroke-width="1.4"/>
      <text x="97" y="595" fill="#8b98a5" font-size="9" letter-spacing="1.5">ASSUMPTION · 0.82</text>
      <text x="180" y="617" text-anchor="middle">Load is uneven</text>
      <text x="180" y="633" text-anchor="middle">across features</text>
    </g>
    <g>
      <rect x="585" y="575" width="190" height="66" rx="9" fill="#1a2130" stroke="#4b5563" stroke-width="1.4"/>
      <text x="597" y="595" fill="#8b98a5" font-size="9" letter-spacing="1.5">ASSUMPTION · 0.71</text>
      <text x="680" y="617" text-anchor="middle">We have k8s /</text>
      <text x="680" y="633" text-anchor="middle">DevOps maturity</text>
    </g>
    <g>
      <rect x="835" y="575" width="190" height="66" rx="9" fill="#1a2130" stroke="#4b5563" stroke-width="1.4"/>
      <text x="847" y="595" fill="#8b98a5" font-size="9" letter-spacing="1.5">ASSUMPTION · 0.78</text>
      <text x="930" y="617" text-anchor="middle">Services have</text>
      <text x="930" y="633" text-anchor="middle">clean boundaries</text>
    </g>

    <!-- KEYSTONE -->
    <g filter="url(#redGlow)">
      <rect x="335" y="575" width="190" height="66" rx="9" fill="#2a1416" stroke="#ef4444" stroke-width="2.2"/>
      <polyline points="360,575 392,598 372,612 418,641" fill="none" stroke="#ef4444" stroke-width="1.4" opacity="0.85"/>
      <text x="347" y="595" fill="#f87171" font-size="9" letter-spacing="1.5">KEYSTONE · 0.55</text>
      <text x="430" y="617" text-anchor="middle" fill="#fca5a5" font-size="12.5">Scaling pain is</text>
      <text x="430" y="633" text-anchor="middle" fill="#fca5a5" font-size="12.5">architectural, not org</text>
    </g>
  </g>

  <!-- Keystone callout -->
  <g>
    <path d="M430,641 L430,690" stroke="#ef4444" stroke-width="1.4" stroke-dasharray="4 4"/>
    <rect x="250" y="690" width="360" height="46" rx="8" fill="#1a0f11" stroke="#ef4444" stroke-width="1.4"/>
    <text x="270" y="712" fill="#f87171" font-size="13" font-weight="600">◆ LOAD-BEARING ASSUMPTION</text>
    <text x="270" y="729" fill="#e6a5a5" font-size="11.5">Knock-out impact: integrity 87% → 34%  (−53%)</text>
  </g>

  <!-- legend -->
  <g font-size="12" fill="#8b98a5" transform="translate(760,700)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="none" stroke="#3b82f6"/><text x="22" y="12">Decision</text>
    <rect x="0" y="24" width="14" height="14" rx="3" fill="none" stroke="#14b8a6"/><text x="22" y="36">Claim</text>
    <rect x="140" y="0" width="14" height="14" rx="3" fill="none" stroke="#4b5563"/><text x="162" y="12">Assumption</text>
    <rect x="140" y="24" width="14" height="14" rx="3" fill="none" stroke="#ef4444"/><text x="162" y="36">Keystone (load-bearing)</text>
    <line x1="300" y1="7" x2="330" y2="7" stroke="#ef4444" stroke-width="2.5"/><text x="338" y="12">Load path</text>
    <line x1="300" y1="31" x2="330" y2="31" stroke="#46525f" stroke-width="2"/><text x="338" y="36">Support edge</text>
  </g>
</svg>
